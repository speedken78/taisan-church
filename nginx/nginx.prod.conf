worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;

    # 隱藏 nginx 版本號（安全性）
    server_tokens off;

    # 上傳檔案大小限制（配合 multer 5MB 限制）
    client_max_body_size 10M;

    # -------------------------------------------------------
    # HTTP → HTTPS 強制跳轉
    # -------------------------------------------------------
    server {
        listen 80;
        server_name yourdomain.org.tw admin.yourdomain.org.tw;

        # Let's Encrypt 憑證申請驗證用
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # -------------------------------------------------------
    # 前台網站：yourdomain.org.tw
    # -------------------------------------------------------
    server {
        listen 443 ssl;
        server_name yourdomain.org.tw;

        ssl_certificate     /etc/letsencrypt/live/yourdomain.org.tw/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/yourdomain.org.tw/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # 安全性 headers
        add_header X-Frame-Options "SAMEORIGIN";
        add_header X-Content-Type-Options "nosniff";
        add_header X-XSS-Protection "1; mode=block";

        # API 請求轉發到 backend
        location /api/ {
            proxy_pass http://backend:5001;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # 1. files 目錄（圖片直接顯示，不強制下載）
        location /uploads/files/ {
            alias /var/www/uploads/files/;
            expires 7d;
            add_header Cache-Control "public";
            add_header X-Content-Type-Options "nosniff";
        }

        # 2. resources 目錄（強制下載）
        location /uploads/resources/ {
            alias /var/www/uploads/resources/;
            expires 7d;
            add_header Cache-Control "public";
            add_header Content-Disposition "attachment";
            add_header X-Content-Type-Options "nosniff";
        }

        # 3. 其餘 uploads（fallback）
        location /uploads/ {
            alias /var/www/uploads/;
            expires 30d;
            add_header Cache-Control "public";
        }

        # 前台 React SPA
        location / {
            proxy_pass http://frontend:80;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }

    # -------------------------------------------------------
    # 後台 CMS：admin.yourdomain.org.tw
    # -------------------------------------------------------
    server {
        listen 443 ssl;
        server_name admin.yourdomain.org.tw;

        ssl_certificate     /etc/letsencrypt/live/yourdomain.org.tw/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/yourdomain.org.tw/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        add_header X-Frame-Options "SAMEORIGIN";
        add_header X-Content-Type-Options "nosniff";
        add_header X-XSS-Protection "1; mode=block";

        # API 請求轉發到 backend
        location /api/ {
            proxy_pass http://backend:5001;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # 後台 React SPA
        location / {
            proxy_pass http://admin:80;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
